---
layout: default
---
<article class="post">
  <header class="post-header">
    <p class="post-meta"><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>{% if page.categories.size > 0 %} · {{ page.categories | join: ", " }}{% endif %}</p>
    <h1 class="post-title">{{ page.title }}</h1>
  </header>
  <div class="post-content prose">
    {{ content }}
  </div>
</article>
